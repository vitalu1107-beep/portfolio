<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">AI 投递助手下一轮验证计划</title>
  <desc id="desc">展示 AI 投递助手当前证据边界和下一轮需要验证的效率、质量、跟进与回复指标。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#064e3b" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="760" rx="36" fill="#f8fbf7"/>
  <text x="70" y="92" fill="#0f172a" font-family="PingFang SC, Arial, sans-serif" font-size="34" font-weight="800">验证边界与下一轮指标</text>
  <text x="70" y="128" fill="#64748b" font-family="PingFang SC, Arial, sans-serif" font-size="18">不虚构商业结果；先说明已验证什么，再定义真实使用中要追踪什么。</text>

  <g font-family="PingFang SC, Arial, sans-serif" filter="url(#shadow)">
    <rect x="80" y="190" width="310" height="380" rx="28" fill="#ffffff" stroke="#c7e5d5"/>
    <text x="116" y="246" fill="#047857" font-size="22" font-weight="900">当前已完成</text>
    <text x="116" y="306" fill="#0f172a" font-size="25" font-weight="900">产品交付证据</text>
    <text x="116" y="352" fill="#64748b" font-size="17">0→1 静态原型</text>
    <text x="116" y="386" fill="#64748b" font-size="17">公开代码仓库</text>
    <text x="116" y="420" fill="#64748b" font-size="17">mock / 真实模型双模式</text>
    <text x="116" y="454" fill="#64748b" font-size="17">localStorage 记录</text>
  </g>

  <g font-family="PingFang SC, Arial, sans-serif" filter="url(#shadow)">
    <rect x="445" y="190" width="310" height="380" rx="28" fill="#ffffff" stroke="#c7e5d5"/>
    <text x="481" y="246" fill="#047857" font-size="22" font-weight="900">下一轮要验证</text>
    <text x="481" y="306" fill="#0f172a" font-size="25" font-weight="900">效率与质量</text>
    <text x="481" y="352" fill="#64748b" font-size="17">单个 JD 判断耗时</text>
    <text x="481" y="386" fill="#64748b" font-size="17">AI 建议采纳率</text>
    <text x="481" y="420" fill="#64748b" font-size="17">话术二次修改比例</text>
    <text x="481" y="454" fill="#64748b" font-size="17">跟进记录完整率</text>
  </g>

  <g font-family="PingFang SC, Arial, sans-serif" filter="url(#shadow)">
    <rect x="810" y="190" width="310" height="380" rx="28" fill="#ffffff" stroke="#fde68a"/>
    <text x="846" y="246" fill="#854d0e" font-size="22" font-weight="900">暂不夸大</text>
    <text x="846" y="306" fill="#0f172a" font-size="25" font-weight="900">结果边界</text>
    <text x="846" y="352" fill="#64748b" font-size="17">不写用户量</text>
    <text x="846" y="386" fill="#64748b" font-size="17">不写转化率</text>
    <text x="846" y="420" fill="#64748b" font-size="17">不把静态页说成在线 AI</text>
    <text x="846" y="454" fill="#64748b" font-size="17">不提交 API Key</text>
  </g>

  <rect x="160" y="625" width="880" height="72" rx="20" fill="#ecfdf5" stroke="#b9dec9"/>
  <text x="198" y="670" fill="#065f46" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="800">CEO 视角：当前证明的是产品化和交付能力；真实业务价值要通过节省时间、提高有效沟通与减少漏跟进继续验证。</text>
</svg>
