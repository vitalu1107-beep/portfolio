<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">AI 智能投递助手工作流闭环</title>
  <desc id="desc">展示从岗位 JD 输入、AI 岗位判断、分对象话术生成到投递记录的产品闭环。</desc>
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#d9eee4" stroke-width="1"/>
      <circle cx="2" cy="2" r="1.2" fill="#a9d9c2"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#064e3b" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#059669"/>
    </marker>
  </defs>
  <rect width="1200" height="760" rx="36" fill="#f7fbf8"/>
  <rect x="28" y="28" width="1144" height="704" rx="32" fill="url(#grid)" stroke="#c7e5d5"/>
  <text x="70" y="88" fill="#0f172a" font-family="PingFang SC, Arial, sans-serif" font-size="34" font-weight="800">AI 智能投递助手｜产品闭环</text>
  <text x="70" y="124" fill="#64748b" font-family="PingFang SC, Arial, sans-serif" font-size="18">把高频求职动作拆成判断、表达、记录三层，而不是只生成一句话术。</text>

  <g filter="url(#shadow)" font-family="PingFang SC, Arial, sans-serif">
    <rect x="70" y="190" width="220" height="260" rx="22" fill="#ffffff" stroke="#b9dec9"/>
    <text x="96" y="236" fill="#047857" font-size="17" font-weight="800">01 岗位输入</text>
    <text x="96" y="278" fill="#0f172a" font-size="24" font-weight="800">JD 结构化</text>
    <text x="96" y="318" fill="#64748b" font-size="16">公司 / 岗位</text>
    <text x="96" y="348" fill="#64748b" font-size="16">职责 / 要求</text>
    <text x="96" y="378" fill="#64748b" font-size="16">关键词 / 风险点</text>
  </g>

  <g filter="url(#shadow)" font-family="PingFang SC, Arial, sans-serif">
    <rect x="360" y="190" width="220" height="260" rx="22" fill="#ffffff" stroke="#b9dec9"/>
    <text x="386" y="236" fill="#047857" font-size="17" font-weight="800">02 AI 判断</text>
    <text x="386" y="278" fill="#0f172a" font-size="24" font-weight="800">是否值得投</text>
    <rect x="386" y="316" width="150" height="38" rx="19" fill="#dcfce7" stroke="#86efac"/>
    <text x="410" y="341" fill="#047857" font-size="16" font-weight="800">优先级 A/B/C</text>
    <rect x="386" y="370" width="150" height="38" rx="19" fill="#fef9c3" stroke="#fde68a"/>
    <text x="412" y="395" fill="#854d0e" font-size="16" font-weight="800">匹配点 + 风险</text>
  </g>

  <g filter="url(#shadow)" font-family="PingFang SC, Arial, sans-serif">
    <rect x="650" y="190" width="250" height="260" rx="22" fill="#ffffff" stroke="#b9dec9"/>
    <text x="676" y="236" fill="#047857" font-size="17" font-weight="800">03 分对象话术</text>
    <text x="676" y="278" fill="#0f172a" font-size="24" font-weight="800">不是统一模板</text>
    <rect x="676" y="316" width="82" height="34" rx="17" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="704" y="339" fill="#047857" font-size="15" font-weight="800">HR</text>
    <rect x="772" y="316" width="82" height="34" rx="17" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="798" y="339" fill="#047857" font-size="15" font-weight="800">猎头</text>
    <rect x="676" y="368" width="82" height="34" rx="17" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="696" y="391" fill="#047857" font-size="15" font-weight="800">主管</text>
    <rect x="772" y="368" width="82" height="34" rx="17" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="790" y="391" fill="#047857" font-size="15" font-weight="800">创始人</text>
  </g>

  <g filter="url(#shadow)" font-family="PingFang SC, Arial, sans-serif">
    <rect x="970" y="190" width="160" height="260" rx="22" fill="#ffffff" stroke="#b9dec9"/>
    <text x="996" y="236" fill="#047857" font-size="17" font-weight="800">04 记录</text>
    <text x="996" y="278" fill="#0f172a" font-size="24" font-weight="800">轻量复盘</text>
    <text x="996" y="318" fill="#64748b" font-size="16">投递状态</text>
    <text x="996" y="348" fill="#64748b" font-size="16">沟通对象</text>
    <text x="996" y="378" fill="#64748b" font-size="16">后续跟进</text>
  </g>

  <path d="M 300 320 H 348" stroke="#059669" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 590 320 H 638" stroke="#059669" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 910 320 H 958" stroke="#059669" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <rect x="160" y="540" width="880" height="96" rx="22" fill="#ffffff" stroke="#b9dec9" filter="url(#shadow)"/>
  <text x="200" y="585" fill="#0f172a" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="800">运营主管视角</text>
  <text x="200" y="620" fill="#64748b" font-family="PingFang SC, Arial, sans-serif" font-size="18">核心价值不是“帮我写一句开场白”，而是把高频判断成本和后续复盘成本收拢到一个可验证流程里。</text>
</svg>
