<svg width="960" height="540" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">活动复盘文档重绘</title>
  <desc id="desc">把活动复盘拆成渠道效率、话术物料、用户承接、成本ROI和复制清单。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#fff7e6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#111827" flood-opacity=".1"/>
    </filter>
  </defs>
  <rect width="960" height="540" rx="34" fill="url(#bg)"/>
  <text x="72" y="82" fill="#2563eb" font-family="Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="2">REVIEW DOC</text>
  <text x="72" y="126" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="900">活动复盘沉淀为下一轮SOP</text>
  <g transform="translate(72 174)" filter="url(#shadow)" font-family="Arial, sans-serif">
    <rect width="816" height="276" rx="28" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
    <line x1="0" y1="82" x2="816" y2="82" stroke="#e5efff" stroke-width="2"/>
    <text x="34" y="52" fill="#111827" font-size="24" font-weight="900">复盘维度</text>
    <text x="336" y="52" fill="#111827" font-size="24" font-weight="900">沉淀内容</text>
    <text x="654" y="52" fill="#111827" font-size="24" font-weight="900">下一步动作</text>
    <g font-size="19" font-weight="800">
      <text x="34" y="122" fill="#2563eb">渠道效率</text>
      <text x="34" y="172" fill="#2563eb">话术物料</text>
      <text x="34" y="222" fill="#2563eb">成本ROI</text>
      <text x="34" y="272" fill="#2563eb">复制清单</text>
    </g>
    <g fill="#4b5563" font-size="18" font-weight="700">
      <text x="196" y="122">区长责任制 / 销配一体小助手数据</text>
      <text x="196" y="172">BD引流话术、社群话术、推荐礼物料</text>
      <text x="196" y="222">单粉成本约1元，ROI 1:5</text>
      <text x="196" y="272">可复制到下一批新城市冷启动</text>
    </g>
    <g>
      <rect x="620" y="98" width="154" height="40" rx="20" fill="#e0edff"/>
      <rect x="620" y="148" width="154" height="40" rx="20" fill="#fff3c4"/>
      <rect x="620" y="198" width="154" height="40" rx="20" fill="#e8f7ef"/>
      <rect x="620" y="248" width="154" height="40" rx="20" fill="#f4eaff"/>
      <text x="697" y="124" text-anchor="middle" fill="#2563eb" font-size="16" font-weight="900">保留高效渠道</text>
      <text x="697" y="174" text-anchor="middle" fill="#a16207" font-size="16" font-weight="900">优化低效话术</text>
      <text x="697" y="224" text-anchor="middle" fill="#15803d" font-size="16" font-weight="900">跟踪成本结构</text>
      <text x="697" y="274" text-anchor="middle" fill="#7e22ce" font-size="16" font-weight="900">形成模板</text>
    </g>
  </g>
  <text x="72" y="492" fill="#6b7280" font-family="Arial, sans-serif" font-size="20" font-weight="800">复盘重点：不是展示单个用户故事，而是把渠道、话术、物料、承接和成本转化为可复用增长资产。</text>
</svg>
