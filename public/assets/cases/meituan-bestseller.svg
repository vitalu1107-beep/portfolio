<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1012" role="img" aria-labelledby="title desc">
  <title id="title">美团团买买爆品增长飞轮</title>
  <desc id="desc">展示独家爆品、KOS种草、直播矩阵和GMV结果。</desc>
  <rect width="1800" height="1012" fill="#fffdf7"/>
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.4" fill="#2b7fd8" opacity=".18"/>
    </pattern>
  </defs>
  <rect width="1800" height="1012" fill="url(#dots)"/>
  <text x="130" y="148" fill="#2b7fd8" font-family="Arial, sans-serif" font-size="44" font-weight="900">爆品策略：KOS种草 + 直播矩阵联动</text>
  <text x="130" y="204" fill="#4a4a5a" font-family="Arial, sans-serif" font-size="24">从供给里筛出可讲、可卖、可复购的独家爆品，再用内容和直播放大转化。</text>
  <g transform="translate(230 310)" font-family="Arial, sans-serif">
