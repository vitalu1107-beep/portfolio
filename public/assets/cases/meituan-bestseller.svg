    <text x="660" y="302" text-anchor="middle" fill="#fff" font-size="34" font-weight="900">增长飞轮</text>
    <rect x="0" y="52" width="300" height="106" rx="28" fill="#fff" stroke="#c5ddf6"/>
    <text x="150" y="98" text-anchor="middle" fill="#2b7fd8" font-size="28" font-weight="900">30+独家爆品</text>
    <text x="150" y="132" text-anchor="middle" fill="#4a4a5a" font-size="20">供给侧筛选</text>
    <rect x="1020" y="52" width="300" height="106" rx="28" fill="#fff" stroke="#c5ddf6"/>
    <text x="1170" y="98" text-anchor="middle" fill="#2b7fd8" font-size="28" font-weight="900">KOS种草</text>
    <text x="1170" y="132" text-anchor="middle" fill="#4a4a5a" font-size="20">内容侧放大</text>
    <rect x="0" y="390" width="300" height="106" rx="28" fill="#fff" stroke="#c5ddf6"/>
    <text x="150" y="436" text-anchor="middle" fill="#2b7fd8" font-size="28" font-weight="900">主题场景</text>
    <text x="150" y="470" text-anchor="middle" fill="#4a4a5a" font-size="20">早C晚A</text>
    <rect x="1020" y="390" width="300" height="106" rx="28" fill="#fff" stroke="#c5ddf6"/>
    <text x="1170" y="436" text-anchor="middle" fill="#2b7fd8" font-size="28" font-weight="900">直播矩阵</text>
    <text x="1170" y="470" text-anchor="middle" fill="#4a4a5a" font-size="20">成交承接</text>
    <path d="M318 105 C420 85 500 114 555 168" fill="none" stroke="#2b7fd8" stroke-width="7" stroke-dasharray="18 14"/>
    <path d="M765 168 C830 105 925 84 1004 105" fill="none" stroke="#2b7fd8" stroke-width="7" stroke-dasharray="18 14"/>
    <path d="M1004 443 C905 465 820 428 765 372" fill="none" stroke="#2b7fd8" stroke-width="7" stroke-dasharray="18 14"/>
    <path d="M555 372 C480 438 400 462 318 443" fill="none" stroke="#2b7fd8" stroke-width="7" stroke-dasharray="18 14"/>
