  <g transform="translate(226 814)" font-family="Arial, sans-serif">
    <rect width="1348" height="86" rx="24" fill="white" stroke="#c5ddf6"/>
    <text x="150" y="54" fill="#1a1a2e" font-size="30" font-weight="900">GMV占比65%</text>
    <text x="460" y="54" fill="#1a1a2e" font-size="30" font-weight="900">客单价+55%</text>
