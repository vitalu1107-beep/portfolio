<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">AI 投递助手分对象 Prompt 设计矩阵</title>
  <desc id="desc">展示 HR、猎头、业务主管和创始人四类沟通对象的关注点与话术策略。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#064e3b" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="760" rx="36" fill="#f8fbf7"/>
  <text x="70" y="92" fill="#0f172a" font-family="PingFang SC, Arial, sans-serif" font-size="34" font-weight="800">分对象 Prompt 设计矩阵</text>
  <text x="70" y="128" fill="#64748b" font-family="PingFang SC, Arial, sans-serif" font-size="18">同一个岗位，面对不同接收方要突出不同利益点和证据，而不是套用统一模板。</text>

  <g font-family="PingFang SC, Arial, sans-serif" filter="url(#shadow)">
    <rect x="70" y="185" width="250" height="390" rx="24" fill="#ffffff" stroke="#c7e5d5"/>
    <text x="98" y="235" fill="#047857" font-size="26" font-weight="900">HR</text>
    <text x="98" y="282" fill="#0f172a" font-size="20" font-weight="800">关注点</text>
    <text x="98" y="318" fill="#64748b" font-size="17">硬性匹配 / 到岗意愿</text>
    <text x="98" y="348" fill="#64748b" font-size="17">关键词覆盖 / 沟通效率</text>
    <text x="98" y="408" fill="#0f172a" font-size="20" font-weight="800">话术策略</text>
    <text x="98" y="444" fill="#047857" font-size="17" font-weight="800">先给匹配结论</text>
    <text x="98" y="474" fill="#64748b" font-size="17">再列 2-3 个证据点</text>
  </g>

  <g font-family="PingFang SC, Arial, sans-serif" filter="url(#shadow)">
    <rect x="350" y="185" width="250" height="390" rx="24" fill="#ffffff" stroke="#c7e5d5"/>
    <text x="378" y="235" fill="#047857" font-size="26" font-weight="900">猎头</text>
    <text x="378" y="282" fill="#0f172a" font-size="20" font-weight="800">关注点</text>
    <text x="378" y="318" fill="#64748b" font-size="17">岗位卖点 / 成功推荐</text>
    <text x="378" y="348" fill="#64748b" font-size="17">候选人差异化标签</text>
    <text x="378" y="408" fill="#0f172a" font-size="20" font-weight="800">话术策略</text>
    <text x="378" y="444" fill="#047857" font-size="17" font-weight="800">给出定位标签</text>
    <text x="378" y="474" fill="#64748b" font-size="17">方便猎头转述推荐</text>
  </g>

  <g font-family="PingFang SC, Arial, sans-serif" filter="url(#shadow)">
    <rect x="630" y="185" width="250" height="390" rx="24" fill="#ffffff" stroke="#c7e5d5"/>
    <text x="658" y="235" fill="#047857" font-size="26" font-weight="900">业务主管</text>
    <text x="658" y="282" fill="#0f172a" font-size="20" font-weight="800">关注点</text>
    <text x="658" y="318" fill="#64748b" font-size="17">业务理解 / 项目经验</text>
    <text x="658" y="348" fill="#64748b" font-size="17">能否直接解决问题</text>
    <text x="658" y="408" fill="#0f172a" font-size="20" font-weight="800">话术策略</text>
    <text x="658" y="444" fill="#047857" font-size="17" font-weight="800">用案例证明能力</text>
    <text x="658" y="474" fill="#64748b" font-size="17">对齐团队当前卡点</text>
  </g>

  <g font-family="PingFang SC, Arial, sans-serif" filter="url(#shadow)">
    <rect x="910" y="185" width="220" height="390" rx="24" fill="#ffffff" stroke="#c7e5d5"/>
    <text x="938" y="235" fill="#047857" font-size="26" font-weight="900">创始人</text>
    <text x="938" y="282" fill="#0f172a" font-size="20" font-weight="800">关注点</text>
    <text x="938" y="318" fill="#64748b" font-size="17">结果意识 / 自驱</text>
    <text x="938" y="348" fill="#64748b" font-size="17">一人多岗执行力</text>
    <text x="938" y="408" fill="#0f172a" font-size="20" font-weight="800">话术策略</text>
    <text x="938" y="444" fill="#047857" font-size="17" font-weight="800">强调闭环交付</text>
    <text x="938" y="474" fill="#64748b" font-size="17">说明能补的业务空位</text>
  </g>

  <rect x="140" y="625" width="920" height="72" rx="20" fill="#ecfdf5" stroke="#b9dec9"/>
  <text x="178" y="670" fill="#065f46" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="800">Prompt 设计口径：先判断岗位匹配，再按接收方目标改写表达，最后沉淀记录用于复盘。</text>
</svg>
