    <rect x="92" y="322" width="556" height="122" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="118" y="356" class="body">岗位职责：负责 AI 产品运营、用户增长、投递链路优化...</text>
    <text x="118" y="388" class="body">任职要求：能拆解业务场景，具备 Prompt 设计和数据复盘能力。</text>
    <text x="118" y="420" class="tiny">mock JD · 不含真实公司和个人隐私</text>

    <text x="92" y="492" class="label">基础信息</text>
    <g>
      <rect x="92" y="512" width="258" height="58" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="116" y="535" class="tiny">公司名称</text>
      <text x="116" y="558" class="body">某 AI 公司</text>
      <rect x="372" y="512" width="276" height="58" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="396" y="535" class="tiny">岗位名称</text>
      <text x="396" y="558" class="body">AI 产品运营</text>
      <rect x="92" y="586" width="258" height="58" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="116" y="609" class="tiny">岗位所在城市</text>
      <text x="116" y="632" class="body">杭州 / 混合办公</text>
      <rect x="372" y="586" width="276" height="58" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="396" y="609" class="tiny">岗位薪资</text>
      <text x="396" y="632" class="body">20-30K · 需确认区间</text>
    </g>

    <text x="92" y="694" class="label">投递设置</text>
    <g>
      <rect x="92" y="714" width="96" height="32" rx="16" fill="#064e3b"/>
      <text x="116" y="735" class="tiny white">Boss直聘</text>
      <rect x="202" y="714" width="80" height="32" rx="16" fill="#ffffff" stroke="#a7f3d0"/>
      <text x="227" y="735" class="tiny green">猎聘</text>
      <rect x="296" y="714" width="80" height="32" rx="16" fill="#ffffff" stroke="#a7f3d0"/>
      <text x="321" y="735" class="tiny green">拉勾</text>
      <rect x="400" y="714" width="72" height="32" rx="16" fill="#ffffff" stroke="#a7f3d0"/>
      <text x="424" y="735" class="tiny green">HR</text>
      <rect x="486" y="714" width="96" height="32" rx="16" fill="#ffffff" stroke="#a7f3d0"/>
      <text x="513" y="735" class="tiny green">业务主管</text>
    </g>

    <text x="92" y="792" class="label">个人筛选偏好</text>
    <rect x="92" y="812" width="556" height="42" rx="14" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="118" y="839" class="body green">目标城市 / 期望薪资 / 最低薪资 / 工作模式</text>
  </g>

  <g class="font" filter="url(#softShadow)">
    <rect x="754" y="188" width="628" height="688" rx="24" fill="url(#panel)" stroke="#d1d5db"/>
    <rect x="754" y="188" width="628" height="74" rx="24" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="788" y="233" class="title" font-size="24">生成结果</text>
    <text x="916" y="233" class="sub">优先级判断、四类话术、简历建议与投递记录。</text>

    <rect x="788" y="292" width="560" height="48" rx="14" fill="#f9fafb" stroke="#e5e7eb"/>
    <text x="812" y="322" class="body">某 AI 公司｜AI 产品运营｜Boss直聘｜HR｜建议优先级 A</text>

    <text x="788" y="382" class="label">岗位筛选判断</text>
    <g>
      <rect x="788" y="402" width="172" height="82" rx="16" fill="#ecfdf5" stroke="#a7f3d0"/>
      <text x="812" y="431" class="tiny">优先级</text>
      <text x="812" y="464" class="title green">A</text>
      <rect x="978" y="402" width="172" height="82" rx="16" fill="#ecfdf5" stroke="#a7f3d0"/>
      <text x="1002" y="431" class="tiny">建议</text>
      <text x="1002" y="464" class="body green" font-weight="850">建议投递</text>
      <rect x="1168" y="402" width="180" height="82" rx="16" fill="#f9fafb" stroke="#e5e7eb"/>
      <text x="1192" y="431" class="tiny">岗位类型</text>
      <text x="1192" y="464" class="body">项目负责人岗</text>
      <rect x="788" y="500" width="172" height="70" rx="16" fill="#f9fafb" stroke="#e5e7eb"/>
      <text x="812" y="527" class="tiny">执行风险</text>
      <text x="812" y="552" class="body green">低</text>
      <rect x="978" y="500" width="172" height="70" rx="16" fill="#f9fafb" stroke="#e5e7eb"/>
      <text x="1002" y="527" class="tiny">工作强度风险</text>
      <text x="1002" y="552" class="body green">正常</text>
      <rect x="1168" y="500" width="180" height="70" rx="16" fill="#fffbeb" stroke="#fde68a"/>
      <text x="1192" y="527" class="tiny">薪资城市适配</text>
      <text x="1192" y="552" class="body amber">待确认</text>
    </g>

    <text x="788" y="628" class="label">打招呼话术</text>
    <g>
      <rect x="788" y="648" width="264" height="82" rx="16" fill="#ecfdf5" stroke="#a7f3d0"/>
      <text x="812" y="676" class="body green" font-weight="850">HR版 · 推荐</text>
      <text x="812" y="704" class="tiny">表达匹配点和沟通意愿</text>
      <rect x="1074" y="648" width="274" height="82" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="1098" y="676" class="body">业务主管版</text>
      <text x="1098" y="704" class="tiny">突出业务理解与工具落地</text>
    </g>

    <g>
      <rect x="788" y="762" width="112" height="38" rx="19" fill="#ffffff" stroke="#a7f3d0"/>
      <text x="812" y="786" class="tiny green">复制全部</text>
      <rect x="918" y="762" width="138" height="38" rx="19" fill="#ffffff" stroke="#a7f3d0"/>
      <text x="946" y="786" class="tiny green">优化选中话术</text>
      <rect x="1074" y="762" width="152" height="38" rx="19" fill="#059669"/>
      <text x="1100" y="786" class="tiny white">保存到投递记录</text>
      <rect x="1244" y="762" width="104" height="38" rx="19" fill="#f9fafb" stroke="#e5e7eb"/>
      <text x="1269" y="786" class="tiny">记录视图</text>
    </g>

    <rect x="788" y="824" width="560" height="28" rx="14" fill="#ffffff" stroke="#d1fae5"/>
    <text x="812" y="843" class="tiny green">岗位输入 → AI 判断 → 分对象话术 → 简历建议 → 面试问题 → 投递记录</text>
  </g>

  <g class="font">
    <rect x="58" y="900" width="1324" height="36" rx="18" fill="#ffffff" opacity="0.86" stroke="#d1fae5"/>
    <text x="92" y="923" class="tiny">证据来源：本地 http://127.0.0.1:3000 最新 mock 工作台 · 不含真实简历、手机号、公司隐私或 API Key</text>
  </g>
</svg>
