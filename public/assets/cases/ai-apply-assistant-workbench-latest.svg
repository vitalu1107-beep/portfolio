<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" role="img" aria-labelledby="title desc">
  <title id="title">AI 智能投递助手本地最新版工作台界面</title>
  <desc id="desc">基于本地 http://127.0.0.1:3000 最新版本重制的产品界面证据图，展示岗位输入、AI 判断、分对象话术、简历微调、面试问题和投递记录闭环。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.58" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ecfdf5"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f9fafb"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#d9eee4" stroke-width="0.8"/>
      <circle cx="3" cy="3" r="1.15" fill="#b9dec9"/>
    </pattern>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="132%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#064e3b" flood-opacity="0.12"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#111827" flood-opacity="0.06"/>
    </filter>
    <style>
      .font { font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .title { fill: #111827; font-size: 27px; font-weight: 850; }
      .sub { fill: #6b7280; font-size: 15px; font-weight: 600; }
      .label { fill: #374151; font-size: 14px; font-weight: 760; }
      .body { fill: #4b5563; font-size: 15px; font-weight: 620; }
      .tiny { fill: #6b7280; font-size: 12px; font-weight: 650; }
      .green { fill: #047857; }
      .deep { fill: #064e3b; }
      .amber { fill: #92400e; }
      .white { fill: #ffffff; }
      .line { stroke: #e5e7eb; }
      .greenLine { stroke: #a7f3d0; }
    </style>
  </defs>

  <rect width="1440" height="960" rx="34" fill="url(#bg)"/>
  <rect x="24" y="24" width="1392" height="912" rx="30" fill="url(#grid)" opacity="0.62"/>

  <g class="font" filter="url(#shadow)">
    <rect x="58" y="52" width="1324" height="106" rx="24" fill="#ffffff" stroke="#d1fae5"/>
    <text x="96" y="102" class="title">AI 智能投递助手</text>
    <text x="96" y="132" class="sub">高频投递前的岗位筛选、话术生成与轻量记录工作台</text>
    <rect x="1098" y="78" width="86" height="32" rx="16" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="1121" y="100" class="tiny green">UI 原型</text>
    <rect x="1198" y="78" width="102" height="32" rx="16" fill="#f9fafb" stroke="#e5e7eb"/>
    <text x="1221" y="100" class="tiny">本地 mock</text>
    <rect x="1312" y="78" width="28" height="32" rx="14" fill="#059669"/>
    <text x="1320" y="100" class="tiny white">A</text>
  </g>

  <g class="font" filter="url(#softShadow)">
    <rect x="58" y="188" width="628" height="688" rx="24" fill="url(#panel)" stroke="#d1d5db"/>
    <rect x="58" y="188" width="628" height="74" rx="24" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="92" y="233" class="title" font-size="24">输入信息</text>
    <text x="220" y="233" class="sub">粘贴岗位 JD，选择投递场景，生成可直接复制的话术。</text>

